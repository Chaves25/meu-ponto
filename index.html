<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meu Ponto</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:'Segoe UI'; margin:0; background:#f4f6f9; }
.dark { background:#121212; color:#eee; }

.container { max-width:900px; margin:auto; padding:15px; }

h2 { text-align:center; }

button {
  background:#0d6efd; color:white; border:none;
  padding:12px; margin:5px;
  border-radius:10px; cursor:pointer;
}

.btn-danger { background:#dc3545; }

.card {
  background:white; padding:15px;
  margin-top:10px; border-radius:12px;
}

table { width:100%; border-collapse:collapse; }
th { background:#0d6efd; color:white; }
td,th { padding:8px; text-align:center; }

.extra { color:green; }
.falta { color:red; }

/* LOGIN */
.login {
  position:fixed;
  width:100%; height:100%;
  background:linear-gradient(135deg,#0d6efd,#4dabf7);
  display:flex; justify-content:center; align-items:center;
}

.login-box {
  background:white; padding:25px;
  border-radius:15px; width:300px;
  text-align:center;
}

input, select {
  width:100%; padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<!-- TELA LOGIN -->
<div id="loginTela" class="login">
  <div class="login-box">

    <h2>🔐 Meu Ponto</h2>

    <!-- MENU -->
    <div id="menuInicial">
      <button onclick="mostrarLogin()">Entrar</button>
      <button onclick="mostrarCadastro()">Cadastrar</button>
    </div>

    <!-- LOGIN -->
    <div id="areaLogin" style="display:none;">
      <select id="user"></select>
      <input id="pass" type="password" placeholder="Senha">
      <button onclick="entrar()">Entrar</button>
      <button onclick="voltarMenu()">⬅ Voltar</button>
      <p id="erroLogin" style="color:red;"></p>
    </div>

    <!-- CADASTRO -->
    <div id="areaCadastro" style="display:none;">
      <input id="novoUser" placeholder="Novo usuário">
      <input id="novaSenha" type="password" placeholder="Senha">
      <button onclick="criarUsuario()">Cadastrar</button>
      <button onclick="voltarMenu()">⬅ Voltar</button>
    </div>

  </div>
</div>

<div class="container">

<h2>📊 Meu Ponto - <span id="nomeUsuario"></span></h2>

<div>
<button onclick="baterEntrada()">Entrada</button>
<button onclick="baterSaida()">Saída</button>
<button class="btn-danger" onclick="limparMes()">Limpar</button>
<button onclick="toggleDark()">Modo</button>
<button onclick="exportar()">Exportar</button>
<button onclick="logout()">Sair</button>
</div>

<p id="status"></p>

<div class="card">
<table id="historico"></table>
</div>

<div class="card">
Saldo: <span id="bancoHoras"></span>
</div>

<canvas id="grafico"></canvas>

</div>

<script>

// ===== USUÁRIOS =====
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || {};

// ===== MENU =====
function mostrarLogin(){
  document.getElementById("menuInicial").style.display="none";
  document.getElementById("areaLogin").style.display="block";
  atualizarListaUsuarios();
}

function mostrarCadastro(){
  document.getElementById("menuInicial").style.display="none";
  document.getElementById("areaCadastro").style.display="block";
}

function voltarMenu(){
  document.getElementById("menuInicial").style.display="block";
  document.getElementById("areaLogin").style.display="none";
  document.getElementById("areaCadastro").style.display="none";
}

// ===== LISTA =====
function atualizarListaUsuarios(){
  let select = document.getElementById("user");
  select.innerHTML = '<option value="">Selecione usuário</option>';
  for(let u in usuarios){
    select.innerHTML += `<option>${u}</option>`;
  }
}

// ===== LOGIN =====
function entrar(){
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  if(usuarios[user] && usuarios[user] === pass){
    localStorage.setItem("usuarioLogado", user);
    document.getElementById("loginTela").style.display="none";
    iniciarSistema();
    atualizar();
  } else {
    document.getElementById("erroLogin").innerText="Usuário ou senha inválidos";
  }
}

// ===== CADASTRAR =====
function criarUsuario(){
  let user = document.getElementById("novoUser").value;
  let pass = document.getElementById("novaSenha").value;

  if(!user || !pass){
    alert("Preencha tudo!");
    return;
  }

  if(usuarios[user]){
    alert("Usuário já existe!");
    return;
  }

  usuarios[user] = pass;
  localStorage.setItem("usuarios", JSON.stringify(usuarios));

  alert("Usuário criado!");
  voltarMenu();
}

// ===== LOGOUT =====
function logout(){
  localStorage.removeItem("usuarioLogado");
  location.reload();
}

// ===== INICIAR =====
function iniciarSistema(){
  let usuario = localStorage.getItem("usuarioLogado");
  document.getElementById("nomeUsuario").innerText = usuario;
}

// ===== AUTO LOGIN =====
window.onload = function(){
  if(localStorage.getItem("usuarioLogado")){
    document.getElementById("loginTela").style.display="none";
    iniciarSistema();
    atualizar();
  }
}

// ===== PONTO =====
const mesAtual = new Date().getMonth()+1;
let pontoHoje = {};

function getChave(){
  return "ponto_"+mesAtual+"_"+localStorage.getItem("usuarioLogado");
}

function getHistorico(){
  return JSON.parse(localStorage.getItem(getChave()))||[];
}

function salvar(hist){
  localStorage.setItem(getChave(), JSON.stringify(hist));
}

function horaDecimal(h){
  let [h1,m]=h.split(':');
  return parseInt(h1)+m/60;
}

function atualizar(){
  let hist = getHistorico();
  let tabela = document.getElementById("historico");

  tabela.innerHTML="<tr><th>Data</th><th>Entrada</th><th>Saída</th><th>Saldo</th></tr>";

  let total=0;

  hist.forEach(i=>{
    let diff=i.trabalhadas-i.meta;
    total+=diff;

    tabela.innerHTML+=`
    <tr>
      <td>${i.data}</td>
      <td>${i.entrada}</td>
      <td>${i.saida}</td>
      <td class="${diff>=0?'extra':'falta'}">${diff.toFixed(2)}</td>
    </tr>`;
  });

  document.getElementById("bancoHoras").innerText=total.toFixed(2);
}

// ===== REGISTRO =====
function baterEntrada(){
  let agora=new Date();
  pontoHoje.entrada=agora.toLocaleTimeString().slice(0,5);
  pontoHoje.data=agora.toLocaleDateString();
}

function baterSaida(){
  let agora=new Date();
  pontoHoje.saida=agora.toLocaleTimeString().slice(0,5);

  let trab=horaDecimal(pontoHoje.saida)-horaDecimal(pontoHoje.entrada)-1;
  let sexta=new Date().getDay()==5;
  let meta=sexta?8:9;

  let hist=getHistorico();
  hist.push({
    data:pontoHoje.data,
    entrada:pontoHoje.entrada,
    saida:pontoHoje.saida,
    trabalhadas:trab,
    meta:meta
  });

  salvar(hist);
  atualizar();
}

// ===== LIMPAR =====
function limparMes(){
  if(confirm("Limpar tudo?")){
    localStorage.removeItem(getChave());
    atualizar();
  }
}

// ===== DARK MODE =====
function toggleDark(){
  document.body.classList.toggle("dark");
}

// ===== EXPORTAR =====
function exportar(){
  let hist=getHistorico();
  let csv="Data,Entrada,Saida\n";

  hist.forEach(i=>{
    csv+=`${i.data},${i.entrada},${i.saida}\n`;
  });

  let blob=new Blob([csv]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="ponto.csv";
  a.click();
}

</script>

</body>
</html>
